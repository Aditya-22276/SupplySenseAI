services:

  postgres:
    image: postgres:16
    container_name: supplysense_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: supplysense_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - supplysense_network


  backend:
    build:
      context: ./backend

    container_name: supplysense_backend

    restart: always

    env_file:
      - ./backend/.env.docker

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    networks:
      - supplysense_network


  frontend:
    build:
      context: ./frontend

    container_name: supplysense_frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "5173:5173"

    networks:
      - supplysense_network


volumes:
  postgres_data:


networks:
  supplysense_network:
    driver: bridge